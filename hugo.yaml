baseURL: https://jaimedsf.github.io/
title: Blog do Jaime
languageCode: pt-br
defaultContentLanguage: pt-br
enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: false

# Hextra como Hugo module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

services:
  googleAnalytics:
    ID: ""

menu:
  main:
    - name: Sobre
      pageRef: /about
      weight: 1
      params:
        type: link
    - name: GitHub
      weight: 2
      url: https://github.com/Jaimedsf
      params:
        icon: github
    - name: RSS
      weight: 3
      url: /index.xml
      params:
        icon: rss
    - name: Search
      weight: 4
      params:
        type: search
    - weight: 5
      params:
        type: theme-toggle

params:
  description: Blog pessoal de Jaime da Silva — desenvolvedor Full-Stack
  archives:
    section: posts
    dateFormat: "02 Jan 2006"
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: system
    displayToggle: true
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
  page:
    width: normal
  blog:
    list:
      displayTags: true
    article:
      displayPagination: true
